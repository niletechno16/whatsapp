# fly.toml app configuration file generated for nile-bot on 2026-06-23T08:23:54Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'nile-bot'
primary_region = 'cdg'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 200
    soft_limit = 100

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
