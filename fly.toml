app = "nile-bot"
primary_region = "cdg"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 200
    soft_limit = 100

[processes]
  app = "uvicorn main:app --host 0.0.0.0 --port 8080"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
